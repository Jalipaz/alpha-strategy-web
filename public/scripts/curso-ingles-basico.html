<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Inglés desde Cero | Alpha Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#060D26;--navy2:#0B1130;--navy3:#1A2240;--navy4:#242D4A;
  --orange:#FF6B35;--pink:#E91E8C;--cyan:#00B4D8;--green:#00C853;
  --grad:linear-gradient(135deg,#FF6B35,#E91E8C);
  --border:rgba(255,255,255,.07);--gray:#8892A4;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--navy);color:#fff;min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(6,13,38,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.tlogo{font-size:15px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.level-tabs{display:flex;gap:4px;background:var(--navy3);padding:4px;border-radius:10px}
.ltab{padding:6px 18px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.5);font-family:inherit;transition:all .2s}
.ltab.active{background:var(--grad);color:#fff}
.prog-wrap{width:110px;height:5px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.prog-bar{height:100%;background:var(--grad);border-radius:99px;transition:width .3s;width:0%}

/* SIDEBAR */
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:220px;background:var(--navy2);border-right:1px solid var(--border);overflow-y:auto;z-index:200;padding:16px 0}
.sb-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:0 16px;margin-bottom:8px}
.sb-btn{display:block;width:100%;padding:10px 16px;text-align:left;border:none;background:none;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border-left:3px solid transparent;transition:all .2s;line-height:1.4}
.sb-btn:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.04)}
.sb-btn.active{color:var(--orange);border-left-color:var(--orange);background:rgba(255,107,53,.07);font-weight:700}
.sb-num{display:inline-block;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.08);font-size:10px;font-weight:700;text-align:center;line-height:20px;margin-right:8px;flex-shrink:0}
.sb-btn.active .sb-num{background:var(--grad);color:#fff}

/* MAIN */
.main{margin-left:220px;margin-top:56px;padding:36px 36px 80px;max-width:820px}

/* UNIT HERO */
.uhero{margin-bottom:28px}
.utag{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.uhero h1{font-size:clamp(1.7rem,3.5vw,2.6rem);font-weight:900;letter-spacing:-1px;line-height:1.15;margin-bottom:8px}
.uhero h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.uhero p{font-size:14px;color:rgba(255,255,255,.55);line-height:1.6;max-width:500px}

/* CARDS */
.card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;margin-bottom:20px;overflow:hidden}
.ch{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ci{width:38px;height:38px;border-radius:10px;background:var(--navy3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ch h2{font-size:16px;font-weight:800}
.ch p{font-size:12px;color:var(--gray);margin-top:1px}
.cb{padding:20px 22px}

/* VOCAB GRID */
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.vi{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.ven{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.ves{font-size:12px;color:var(--gray)}
.vpr{font-size:11px;color:rgba(0,180,216,.8);margin-top:2px;font-style:italic}

/* GRAMMAR TABLE */
.glabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;border-radius:6px;display:inline-block;margin-bottom:8px}
.gl-pos{background:rgba(255,107,53,.15);color:var(--orange)}
.gl-neg{background:rgba(233,30,140,.15);color:var(--pink)}
.gl-q{background:rgba(0,180,216,.15);color:var(--cyan)}
table.gt{width:100%;border-collapse:collapse;font-size:13px}
table.gt th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
table.gt td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.82)}
table.gt td strong{color:var(--orange)}
table.gt tr:last-child td{border:none}

/* EXAMPLES */
.el{list-style:none}
.el li{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;align-items:flex-start}
.el li:last-child{border:none}
.een{font-weight:600;color:#fff;min-width:200px;flex-shrink:0}
.ees{color:var(--gray)}

/* TIP / RULE */
.tip{background:rgba(0,180,216,.07);border-left:3px solid var(--cyan);border-radius:0 10px 10px 0;padding:11px 14px;font-size:13px;color:rgba(255,255,255,.8);margin-bottom:14px;line-height:1.6}
.tip strong{color:var(--cyan)}
.tip.to{background:rgba(255,107,53,.07);border-left-color:var(--orange)}
.tip.to strong{color:var(--orange)}
.rule{background:var(--navy3);border:1px solid rgba(255,107,53,.15);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.rule h4{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:6px}
.rule p,.rule ul{font-size:13px;color:rgba(255,255,255,.7);line-height:1.7}
.rule ul{padding-left:16px}
.seclabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* DIALOG */
.dialog{background:var(--navy3);border-radius:12px;padding:16px;margin-bottom:12px}
.dline{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.dline:last-child{margin:0}
.dwho{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;min-width:50px;margin-top:4px}
.dwho.a{color:var(--orange)}
.dwho.b{color:var(--cyan)}
.dbbl{background:var(--navy4);border-radius:9px;padding:9px 12px;flex:1}
.den{font-size:13px;font-weight:500;margin-bottom:3px}
.des{font-size:12px;color:var(--gray)}

/* ══════════════════════════════════
   QUIZ ENGINE
══════════════════════════════════ */
.quiz-wrap{background:var(--navy2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.quiz-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.quiz-head h3{font-size:14px;font-weight:700;color:var(--pink)}
.quiz-prog{font-size:12px;color:var(--gray)}
.quiz-pbar{height:4px;background:rgba(255,255,255,.08)}
.quiz-pfill{height:100%;background:var(--grad);transition:width .3s}
.quiz-body{padding:26px 22px}
.quiz-q{font-size:16px;font-weight:600;color:#fff;margin-bottom:20px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.qopt{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:rgba(255,255,255,.8);transition:all .2s;font-family:inherit;text-align:left}
.qopt:hover:not(:disabled){border-color:var(--orange);color:var(--orange);background:rgba(255,107,53,.07)}
.qopt .qletter{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qopt.correct{border-color:var(--green);background:rgba(0,200,83,.1);color:var(--green)}
.qopt.correct .qletter{background:var(--green);color:#fff}
.qopt.wrong{border-color:var(--pink);background:rgba(233,30,140,.08);color:var(--pink)}
.qopt.wrong .qletter{background:var(--pink);color:#fff}
.qopt.show-ans{border-color:var(--green);background:rgba(0,200,83,.06);color:rgba(255,255,255,.6)}
.quiz-fb{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.quiz-fb.ok{background:rgba(0,200,83,.1);color:var(--green);border:1px solid rgba(0,200,83,.2)}
.quiz-fb.no{background:rgba(233,30,140,.08);color:var(--pink);border:1px solid rgba(233,30,140,.2)}
.quiz-next{padding:8px 20px;border-radius:8px;background:var(--grad);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
/* Result */
.quiz-result{padding:36px 22px;text-align:center}
.qr-icon{font-size:54px;margin-bottom:12px}
.qr-score{font-size:48px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.qr-msg{font-size:15px;color:rgba(255,255,255,.7);margin:8px 0 20px}
.qr-restart{padding:12px 30px;border-radius:10px;background:var(--grad);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* UNIT NAV */
.unav{display:flex;justify-content:space-between;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.unav-btn{padding:10px 24px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.uprev{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.1)}
.uprev:hover{background:rgba(255,255,255,.1);color:#fff}
.unext{background:var(--grad);color:#fff;border:none;box-shadow:0 6px 20px rgba(255,107,53,.25)}
.unext:hover{opacity:.88;transform:translateY(-1px)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:20px 14px 100px}
  .level-tabs{display:none}
  .een{min-width:130px}
  .mob-nav{display:flex!important}
}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--border);z-index:300;overflow-x:auto;padding:6px 4px}
.mob-nav-inner{display:flex;min-width:max-content}
.mnb{padding:8px 12px;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.4);border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;transition:all .2s}
.mnb.active{color:var(--orange);border-bottom-color:var(--orange)}
</style>
</head>
<body>

<header class="topbar">
  <span class="tlogo">Alpha Strategy · Inglés</span>
  <div class="level-tabs">
    <button class="ltab active" id="tabBasic" onclick="setLevel('basic')">Nivel Básico</button>
    <button class="ltab" id="tabInter" onclick="setLevel('inter')">Intermedio</button>
    <button class="ltab" id="tabAdv" onclick="setLevel('advanced')">Avanzado</button>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
</header>

<nav class="sidebar" id="sidebar"></nav>

<nav class="mob-nav"><div class="mob-nav-inner" id="mobNav"></div></nav>

<main class="main" id="mainContent"></main>

<script>
// ═══════════════════════════════════════════════════
// COURSE DATA
// ═══════════════════════════════════════════════════

const BASIC_UNITS = [
{
  title:'Pronombres y Artículos', sub:'Pronouns & Articles', icon:'👤',
  tag:'Unidad B1',
  theory:`
  <div class="card"><div class="ch"><div class="ci">👤</div><div><h2>Pronombres personales</h2><p>Personal Pronouns</p></div></div><div class="cb">
    <div class="seclabel">Sujeto (Subject) — hacen la acción</div>
    <div class="vg">
      <div class="vi"><div class="ven">I</div><div class="ves">Yo</div><div class="vpr">/aɪ/</div></div>
      <div class="vi"><div class="ven">You</div><div class="ves">Tú / Usted</div><div class="vpr">/juː/</div></div>
      <div class="vi"><div class="ven">He</div><div class="ves">Él</div><div class="vpr">/hiː/</div></div>
      <div class="vi"><div class="ven">She</div><div class="ves">Ella</div><div class="vpr">/ʃiː/</div></div>
      <div class="vi"><div class="ven">It</div><div class="ves">Ello (cosas/animales)</div><div class="vpr">/ɪt/</div></div>
      <div class="vi"><div class="ven">We</div><div class="ves">Nosotros/as</div><div class="vpr">/wiː/</div></div>
      <div class="vi"><div class="ven">You</div><div class="ves">Ustedes</div><div class="vpr">/juː/</div></div>
      <div class="vi"><div class="ven">They</div><div class="ves">Ellos / Ellas</div><div class="vpr">/ðeɪ/</div></div>
    </div>
    <div class="seclabel" style="margin-top:18px">Objeto (Object) — reciben la acción</div>
    <table class="gt"><tr><th>Sujeto</th><th>Objeto</th><th>Ejemplo</th></tr>
    <tr><td>I</td><td><strong>me</strong></td><td>She loves me.</td></tr>
    <tr><td>You</td><td><strong>you</strong></td><td>I see you.</td></tr>
    <tr><td>He</td><td><strong>him</strong></td><td>Call him!</td></tr>
    <tr><td>She</td><td><strong>her</strong></td><td>I know her.</td></tr>
    <tr><td>It</td><td><strong>it</strong></td><td>I like it.</td></tr>
    <tr><td>We</td><td><strong>us</strong></td><td>Help us!</td></tr>
    <tr><td>They</td><td><strong>them</strong></td><td>I see them.</td></tr>
    </table>
  </div></div>

  <div class="card"><div class="ch"><div class="ci">🏷️</div><div><h2>Pronombres posesivos y adjetivos</h2></div></div><div class="cb">
    <div class="tip"><strong>Adjetivo posesivo:</strong> va antes del sustantivo (my book). <strong>Pronombre posesivo:</strong> reemplaza al sustantivo (it's mine).</div>
    <table class="gt"><tr><th>Sujeto</th><th>Adj. Posesivo</th><th>Pron. Posesivo</th></tr>
    <tr><td>I</td><td><strong>my</strong> (mi)</td><td><strong>mine</strong> (el mío)</td></tr>
    <tr><td>You</td><td><strong>your</strong> (tu)</td><td><strong>yours</strong> (el tuyo)</td></tr>
    <tr><td>He</td><td><strong>his</strong> (su-él)</td><td><strong>his</strong></td></tr>
    <tr><td>She</td><td><strong>her</strong> (su-ella)</td><td><strong>hers</strong></td></tr>
    <tr><td>We</td><td><strong>our</strong> (nuestro)</td><td><strong>ours</strong></td></tr>
    <tr><td>They</td><td><strong>their</strong> (su-ellos)</td><td><strong>theirs</strong></td></tr>
    </table>
    <ul class="el" style="margin-top:12px">
      <li><span class="een">That's my book.</span><span class="ees">Ese es mi libro.</span></li>
      <li><span class="een">The book is mine.</span><span class="ees">El libro es mío.</span></li>
      <li><span class="een">Is this your phone?</span><span class="ees">¿Es tu teléfono?</span></li>
      <li><span class="een">No, it's hers.</span><span class="ees">No, es de ella.</span></li>
    </ul>
  </div></div>

  <div class="card"><div class="ch"><div class="ci">📰</div><div><h2>Artículos y Demostrativos</h2><p>Articles & Demonstratives</p></div></div><div class="cb">
    <div class="rule"><h4>A vs AN</h4><ul><li><strong>A</strong> → consonante: a book · a car · a university (suena "yu")</li><li><strong>AN</strong> → vocal: an apple · an hour · an engineer</li></ul></div>
    <div class="rule"><h4>THE — artículo definido</h4><p>Cuando ya sabemos de qué se habla. Sirve para singular y plural.<br>the book · the books · the sun · the president</p></div>
    <div class="seclabel">Demostrativos</div>
    <table class="gt"><tr><th></th><th>Singular</th><th>Plural</th></tr>
    <tr><td>Cerca</td><td><strong>this</strong> (este/a)</td><td><strong>these</strong> (estos/as)</td></tr>
    <tr><td>Lejos</td><td><strong>that</strong> (ese/aquel)</td><td><strong>those</strong> (esos/aquellos)</td></tr>
    </table>
  </div></div>`,
  quiz:[
    {q:'Do you know Tom? Yes, I know ____.', opts:['he','him','his','her'], ans:1},
    {q:'She loves ____. (yo)', opts:['I','me','my','mine'], ans:1},
    {q:'That\'s ____ car. (de ella)', opts:['she','her','hers','his'], ans:1},
    {q:'The book is ____. (de nosotros)', opts:['our','ours','we','us'], ans:1},
    {q:'She is ____ artist.', opts:['a','an','the','—'], ans:1},
    {q:'____ sun rises in the east.', opts:['A','An','The','—'], ans:2},
    {q:'I have ____ dog.', opts:['a','an','the','—'], ans:0},
    {q:'____ is your book? (cerca)', opts:['That','Those','This','These'], ans:2},
    {q:'____ are my friends. (lejos, plural)', opts:['This','These','That','Those'], ans:3},
    {q:'He called ____. (nosotros)', opts:['we','our','us','ours'], ans:2},
  ]
},
{
  title:'Verbo To Be', sub:'am · is · are', icon:'⚡',
  tag:'Unidad B2',
  theory:`
  <div class="card"><div class="ch"><div class="ci">⚡</div><div><h2>Verbo TO BE — Ser / Estar</h2></div></div><div class="cb">
    <div class="glabel gl-pos">✅ Afirmativo</div>
    <table class="gt"><tr><th>Sujeto</th><th>To Be</th><th>Contracción</th><th>Ejemplo</th></tr>
    <tr><td>I</td><td><strong>am</strong></td><td>I'm</td><td>I'm a student.</td></tr>
    <tr><td>You</td><td><strong>are</strong></td><td>You're</td><td>You're smart.</td></tr>
    <tr><td>He / She / It</td><td><strong>is</strong></td><td>He's / She's / It's</td><td>She's a doctor.</td></tr>
    <tr><td>We / You / They</td><td><strong>are</strong></td><td>We're / They're</td><td>They're friends.</td></tr>
    </table>
    <div class="glabel gl-neg" style="margin-top:14px">❌ Negativo</div>
    <table class="gt"><tr><th>Sujeto</th><th>Negativo</th><th>Contracción</th></tr>
    <tr><td>I</td><td>I am not</td><td>I'm not</td></tr>
    <tr><td>You</td><td>You are not</td><td>You aren't</td></tr>
    <tr><td>He / She / It</td><td>He is not</td><td>He isn't / He's not</td></tr>
    <tr><td>We / You / They</td><td>They are not</td><td>They aren't</td></tr>
    </table>
    <div class="glabel gl-q" style="margin-top:14px">❓ Interrogativo</div>
    <table class="gt"><tr><th>Pregunta</th><th>Sí</th><th>No</th></tr>
    <tr><td>Are you...?</td><td>Yes, I am.</td><td>No, I'm not.</td></tr>
    <tr><td>Is he/she...?</td><td>Yes, he/she is.</td><td>No, he/she isn't.</td></tr>
    <tr><td>Are they...?</td><td>Yes, they are.</td><td>No, they aren't.</td></tr>
    </table>
  </div></div>

  <div class="card"><div class="ch"><div class="ci">🎨</div><div><h2>Adjetivos</h2><p>Descripción de personas y cosas</p></div></div><div class="cb">
    <div class="tip to"><strong>Regla:</strong> El adjetivo va ANTES del sustantivo: a <strong>big</strong> house · a <strong>fast</strong> car · a <strong>beautiful</strong> day.</div>
    <div class="vg">
      <div class="vi"><div class="ven">big / small</div><div class="ves">grande / pequeño</div></div>
      <div class="vi"><div class="ven">tall / short</div><div class="ves">alto / bajo</div></div>
      <div class="vi"><div class="ven">young / old</div><div class="ves">joven / viejo</div></div>
      <div class="vi"><div class="ven">happy / sad</div><div class="ves">feliz / triste</div></div>
      <div class="vi"><div class="ven">hot / cold</div><div class="ves">caliente / frío</div></div>
      <div class="vi"><div class="ven">fast / slow</div><div class="ves">rápido / lento</div></div>
      <div class="vi"><div class="ven">good / bad</div><div class="ves">bueno / malo</div></div>
      <div class="vi"><div class="ven">easy / difficult</div><div class="ves">fácil / difícil</div></div>
      <div class="vi"><div class="ven">tired / hungry</div><div class="ves">cansado / hambriento</div></div>
      <div class="vi"><div class="ven">beautiful / ugly</div><div class="ves">hermoso / feo</div></div>
    </div>
    <ul class="el" style="margin-top:12px">
      <li><span class="een">I am tired.</span><span class="ees">Estoy cansado/a.</span></li>
      <li><span class="een">She is not happy.</span><span class="ees">Ella no está feliz.</span></li>

  theory:`
  <div class="card"><div class="ch"><div class="ci">🔀</div><div><h2>Los 4 Condicionales</h2></div></div><div class="cb">
    <div class="rule"><h4>Zero Conditional — Verdades generales / hechos científicos</h4><p>
    <strong>If + Present Simple, Present Simple</strong><br>
    If you <strong>heat</strong> water to 100°C, it <strong>boils</strong>.<br>
    If it <strong>rains</strong>, the streets <strong>get</strong> wet.
    </p></div>

    <strong>If + Present Simple, will + infinitivo</strong><br>
    If it <strong>rains</strong> tomorrow, I <strong>will stay</strong> home.<br>
    If you <strong>study</strong> hard, you <strong>will pass</strong> the exam.
    </p></div>
    <div class="rule"><h4>Second Conditional — Situaciones hipotéticas / poco probables</h4><p>
    <strong>If + Past Simple, would + infinitivo</strong><br>

    If she <strong>were</strong> taller, she <strong>would be</strong> a model.
    </p></div>
    <div class="rule"><h4>Third Conditional — Situaciones imposibles (pasado que no ocurrió)</h4><p>
    <strong>If + Past Perfect, would have + participio</strong><br>

    If she <strong>hadn't been</strong> late, she <strong>would have got</strong> the job.
    </p></div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let currentLevel = 'basic';
let currentUnit  = 0;

function units(){
  if(currentLevel==='basic') return BASIC_UNITS;
  if(currentLevel==='inter') return INTER_UNITS;
  return ADVANCED_UNITS;
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function setLevel(lvl){
  currentLevel = lvl;
  currentUnit  = 0;
  document.getElementById('tabBasic').classList.toggle('active', lvl==='basic');
  document.getElementById('tabInter').classList.toggle('active', lvl==='inter');
  document.getElementById('tabAdv').classList.toggle('active', lvl==='advanced');
  buildSidebar();
  buildMobNav();
  renderUnit(0);
}

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  const us = units();
  const labels = {basic:'Nivel Básico — A1/A2', inter:'Nivel Intermedio — B1', advanced:'Nivel Avanzado — B2/C1'};
  sb.innerHTML = `<div class="sb-label">${labels[currentLevel]}</div>`
    + us.map((u,i)=>`<button class="sb-btn${i===currentUnit?' active':''}" onclick="goUnit(${i})"><span class="sb-num">${i+1}</span>${u.title}</button>`).join('');
}

function buildMobNav(){
  const mn = document.getElementById('mobNav');
  mn.innerHTML = units().map((u,i)=>`<button class="mnb${i===currentUnit?' active':''}" onclick="goUnit(${i})">${i+1}. ${u.title.split(' ')[0]}</button>`).join('');
}

function goUnit(i){
  currentUnit = i;
  document.querySelectorAll('.sb-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.querySelectorAll('.mnb').forEach((b,j)=>b.classList.toggle('active',j===i));
  const pct = Math.round((i+1)/units().length*100);
  document.getElementById('progBar').style.width = pct+'%';
  renderUnit(i);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderUnit(i){
  const u = units()[i];
  const isFirst = i===0;
  const isLast  = i===units().length-1;
  const mc = document.getElementById('mainContent');

  mc.innerHTML = `
    <div class="uhero">
      <div class="utag">${u.tag}</div>
      <h1>${u.title.replace(' ',' <span>')}${u.title.includes(' ')?'</span>':''}</h1>
      <p>${u.sub}</p>
    </div>
    ${u.theory}
    ${buildNumGrid(i)}
    <div id="quizSection"></div>
    <div class="unav">
      <button class="unav-btn uprev" onclick="goUnit(${i-1})" ${isFirst?'disabled':''}>← Anterior</button>
      <button class="unav-btn unext" onclick="goUnit(${Math.min(i+1,units().length-1)})">${isLast?'Volver al inicio ↺':'Siguiente →'}</button>
    </div>`;

  // patch last btn
  if(isLast){
    mc.querySelector('.unext').onclick = ()=>{ currentUnit=0; goUnit(0); };
  }

  // fix h1 spans
  mc.querySelectorAll('.uhero h1').forEach(h=>{
    const txt = h.textContent;
    const parts = txt.split(' ');
    if(parts.length>=2) h.innerHTML = parts[0]+' <span>'+parts.slice(1).join(' ')+'</span>';
  });

  initQuiz(u.quiz, i);
  // number grid in unit B6
  if(u.title.includes('Números') && document.getElementById('numGrid')){
    const nums=[{n:1,e:'one'},{n:2,e:'two'},{n:3,e:'three'},{n:4,e:'four'},{n:5,e:'five'},
      {n:6,e:'six'},{n:7,e:'seven'},{n:8,e:'eight'},{n:9,e:'nine'},{n:10,e:'ten'},
      {n:11,e:'eleven'},{n:12,e:'twelve'},{n:13,e:'thirteen'},{n:14,e:'fourteen'},{n:15,e:'fifteen'},
      {n:16,e:'sixteen'},{n:17,e:'seventeen'},{n:18,e:'eighteen'},{n:19,e:'nineteen'},{n:20,e:'twenty'},
      {n:30,e:'thirty'},{n:40,e:'forty'},{n:50,e:'fifty'},{n:100,e:'one hundred'}];
    document.getElementById('numGrid').innerHTML = nums.map(n=>`<div class="vi"><div class="ven">${n.e}</div><div class="ves">${n.n}</div></div>`).join('');
  }
}

function buildNumGrid(i){ return ''; } // handled after render

// ═══════════════════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════════════════
function initQuiz(questions, unitIdx){
  const el = document.getElementById('quizSection');
  let current = 0;
  let score = 0;
  const LABELS = ['A','B','C','D'];

  function render(){
    if(current >= questions.length){ showResult(); return; }
    const q = questions[current];
    const pct = Math.round((current/questions.length)*100);
    el.innerHTML = `
      <div class="quiz-wrap">
        <div class="quiz-head">
          <h3>🎯 Ejercicios</h3>
          <span class="quiz-prog">Pregunta ${current+1} de ${questions.length}</span>
        </div>
        <div class="quiz-pbar"><div class="quiz-pfill" id="qpf" style="width:${pct}%"></div></div>
        <div class="quiz-body">
          <div class="quiz-q">${q.q}</div>
          <div class="quiz-opts">
            ${q.opts.map((o,i)=>`
              <button class="qopt" onclick="pickAnswer(${i},${q.ans})">
                <span class="qletter">${LABELS[i]}</span>${o}
              </button>`).join('')}
          </div>
          <div id="quizFb" style="display:none"></div>
        </div>
      </div>`;
  }

  window.pickAnswer = function(chosen, correct){
    document.querySelectorAll('.qopt').forEach((b,i)=>{
      b.disabled = true;
      if(i===correct) b.classList.add('correct');
      else if(i===chosen && chosen!==correct) b.classList.add('wrong');
    });
    const isRight = chosen===correct;
    if(isRight) score++;
    const fb = document.getElementById('quizFb');
    fb.style.display='flex';
    fb.className = 'quiz-fb '+(isRight?'ok':'no');
    fb.innerHTML = `<span>${isRight?'✅ ¡Correcto!':'❌ Incorrecto — la respuesta era: '+questions[current].opts[correct]}</span>
      <button class="quiz-next" onclick="nextQ()">Siguiente →</button>`;
  };

  window.nextQ = function(){
    current++;
    render();
  };

  function showResult(){
    const pct = Math.round(score/questions.length*100);
    let icon = '😤', msg = 'Sigue practicando.';
    if(pct>=90){ icon='🏆'; msg='¡Excelente! Dominas este tema.'; }
    else if(pct>=70){ icon='🎉'; msg='¡Muy bien! Revisa los errores.'; }
    else if(pct>=50){ icon='💪'; msg='Vas por buen camino. Practica más.'; }
    el.innerHTML = `
      <div class="quiz-wrap">
        <div class="quiz-head"><h3>🎯 Resultado</h3></div>
        <div class="quiz-result">
          <div class="qr-icon">${icon}</div>
          <div class="qr-score">${score}/${questions.length}</div>
          <div class="qr-msg">${pct}% · ${msg}</div>
          <button class="qr-restart" onclick="restartQuiz()">Reintentar</button>
        </div>
      </div>`;
  }

  window.restartQuiz = function(){
    current=0; score=0; render();
  };

  render();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildSidebar();
buildMobNav();
renderUnit(0);
document.getElementById('progBar').style.width = Math.round(1/BASIC_UNITS.length*100)+'%';
</script>
